<!DOCTYPE html>
<html>
<head>
    <title>Soil Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            margin: 0;
            padding: 0;
        }

        .main-container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* LEFT SIDE (FORM) */
        .form-container {
            width: 50%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            overflow-y: auto;
        }

        /* RIGHT SIDE (RESULT) */
        .result-container {
            width: 50%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        h3 {
            color: #388e3c;
            margin-top: 20px;
        }

        input[type="text"] {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .radio-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
        }

        label {
            background: #f1f8e9;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        label:hover {
            background: #c8e6c9;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1b5e20;
        }

        .result-box {
            text-align: center;
            padding: 30px;
            background: #e8f5e9;
            border-radius: 10px;
            border-left: 8px solid #2e7d32;
        }

        .result-box h1 {
            color: #1b5e20;
            font-size: 32px;
        }

        .placeholder {
            color: #888;
            font-size: 18px;
        }

    </style>
</head>

<body>

<div class="main-container">

    <!-- LEFT SIDE -->
    <div class="form-container">

        <h2>🌱 Soil Prediction</h2>

        <form action="/predict" method="post">

            <!-- Inputs -->
            <input type="text" name="pH" placeholder="pH" required>
            <input type="text" name="EC" placeholder="EC" required>
            <input type="text" name="OrganicCarbon" placeholder="Organic Carbon" required>
            <input type="text" name="Nitrogen" placeholder="Nitrogen" required>
            <input type="text" name="Phosphorus" placeholder="Phosphorus" required>
            <input type="text" name="Potassium" placeholder="Potassium" required>
            <input type="text" name="Moisture" placeholder="Moisture" required>
            <input type="text" name="CEC" placeholder="CEC" required>

            <!-- District -->
            <h3>Select District</h3>
            <div class="radio-group">
                <label><input type="radio" name="district" value="Ariyalur" required> Ariyalur</label>
                <label><input type="radio" name="district" value="Coimbatore"> Coimbatore</label>
                <label><input type="radio" name="district" value="Cuddalore"> Cuddalore</label>
                <label><input type="radio" name="district" value="Dharmapuri"> Dharmapuri</label>
                <label><input type="radio" name="district" value="Dindigul"> Dindigul</label>
                <label><input type="radio" name="district" value="Erode"> Erode</label>
                <label><input type="radio" name="district" value="Kanchipuram"> Kanchipuram</label>
                <label><input type="radio" name="district" value="Karur"> Karur</label>
                <label><input type="radio" name="district" value="Krishnagiri"> Krishnagiri</label>
                <label><input type="radio" name="district" value="Madurai"> Madurai</label>
                <label><input type="radio" name="district" value="Nagapattinam"> Nagapattinam</label>
                <label><input type="radio" name="district" value="Namakkal"> Namakkal</label>
                <label><input type="radio" name="district" value="Nilgiris"> Nilgiris</label>
                <label><input type="radio" name="district" value="Perambalur"> Perambalur</label>
                <label><input type="radio" name="district" value="Pudukkottai"> Pudukkottai</label>
                <label><input type="radio" name="district" value="Ramanathapuram"> Ramanathapuram</label>
                <label><input type="radio" name="district" value="Salem"> Salem</label>
                <label><input type="radio" name="district" value="Sivaganga"> Sivaganga</label>
                <label><input type="radio" name="district" value="Thanjavur"> Thanjavur</label>
                <label><input type="radio" name="district" value="Theni"> Theni</label>
                <label><input type="radio" name="district" value="Thoothukudi"> Thoothukudi</label>
                <label><input type="radio" name="district" value="Tiruchirappalli"> Tiruchirappalli</label>
                <label><input type="radio" name="district" value="Tirunelveli"> Tirunelveli</label>
                <label><input type="radio" name="district" value="Tiruvallur"> Tiruvallur</label>
                <label><input type="radio" name="district" value="Tiruvarur"> Tiruvarur</label>
                <label><input type="radio" name="district" value="Vellore"> Vellore</label>
                <label><input type="radio" name="district" value="Villupuram"> Villupuram</label>
                <label><input type="radio" name="district" value="Virudhunagar"> Virudhunagar</label>
                <!-- (You can paste full district list here same as before) -->
            </div>

            <!-- Texture -->
            <h3>Select Texture</h3>
            <div class="radio-group">
                <label><input type="radio" name="texture" value="Clay" required> Clay</label>
                <label><input type="radio" name="texture" value="Loam"> Loam</label>
                <label><input type="radio" name="texture" value="Sandy"> Sandy</label>
                <label><input type="radio" name="texture" value="Clay Loam"> Clay Loam</label>
                <label><input type="radio" name="texture" value="Sandy Loam"> Sandy Loam</label>
            </div>

            <button type="submit">Predict Crop</button>

        </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="result-container">

        {% if prediction %}
        <div class="result-box">
            <h2>🌾 Recommended Crop</h2>
            <h1>{{ prediction }}</h1>
        </div>
        {% else %}
        <div class="placeholder">
            👉 Prediction will appear here
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
